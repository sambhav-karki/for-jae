<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hi Jae</title>
  <meta property="og:title" content="Hi Jae ♡" />
  <meta property="og:description" content="something for you.." />
  <meta property="og:image" content="https://sbutterscotch.github.io/for-jae/preview.jpg" />
  <meta property="og:url" content="https://sbutterscotch.github.io/for-jae/" />
  <meta name="twitter:card" content="summary_large_image" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Caveat:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #fdf6ee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(255, 210, 180, .28) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 75%, rgba(255, 185, 200, .22) 0%, transparent 55%),
        radial-gradient(ellipse at 55% 50%, rgba(255, 245, 230, .45) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .petal {
      position: absolute;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 0;
      }

      8% {
        opacity: .55;
      }

      92% {
        opacity: .25;
      }

      100% {
        transform: translateY(110vh) rotate(740deg);
        opacity: 0;
      }
    }

    .scene {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center; gap: 2rem;
  padding: 2rem;
  width: 100%;
  justify-content: flex-start;
  padding-top: clamp(3rem, 10vw, 5rem);
  min-height: 100vh;
}

    .greeting {
      font-size: clamp(2.6rem, 9vw, 5rem);
      font-weight: 400;
      color: #6b3d2e;
      letter-spacing: .03em;
      min-height: 1.2em;
      text-align: center;
    }

    .subgreeting {
      font-family: 'Caveat', cursive;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: #b87a62;
      text-align: center;
      min-height: 1.4em;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .subgreeting.visible {
      opacity: 1;
    }

    .cursor {
      display: inline-block;
      width: 3px;
      height: .82em;
      background: #c4735a;
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    .env-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .2rem;
      opacity: 0;
      transform: translateY(22px);
      transition: opacity .8s ease, transform .8s ease;
    }

    .env-wrap.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .envelope {
      width: 260px;
      height: 180px;
      position: relative;
      cursor: pointer;
      perspective: 800px;
      filter: drop-shadow(0 8px 24px rgba(150, 80, 50, .16));
      transition: transform .3s ease, filter .3s ease;
    }

    .envelope.open-state {
      cursor: default;
    }

    .envelope:not(.open-state):hover {
      transform: translateY(-5px) scale(1.025);
      filter: drop-shadow(0 14px 32px rgba(150, 80, 50, .24));
    }

    .env-body {
      position: absolute;
      inset: 0;
      background: linear-gradient(158deg, #fce8d5 0%, #f5cfb0 100%);
      border-radius: 5px 5px 12px 12px;
      border: 1.5px solid #e8b99a;
    }

    .env-tri-left,
    .env-tri-right {
      position: absolute;
      bottom: 0;
      width: 0;
      height: 0;
      border-style: solid;
      z-index: 2;
    }

    .env-tri-left {
      left: 0;
      border-width: 86px 0 0 130px;
      border-color: transparent transparent transparent #f0c4a0;
    }

    .env-tri-right {
      right: 0;
      border-width: 86px 130px 0 0;
      border-color: transparent #f0c4a0 transparent transparent;
    }

    .env-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 90px;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      background: linear-gradient(158deg, #f7cdb0 0%, #edb48e 100%);
      border-top: 1.5px solid #e8b99a;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform .65s cubic-bezier(.4, 0, .2, 1);
      z-index: 5;
    }

    .env-flap.opened {
      transform: rotateX(-185deg);
    }

    .env-seal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 38px;
      height: 38px;
      background: radial-gradient(circle at 40% 38%, #e0607c, #b03458);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 17px;
      z-index: 6;
      box-shadow: 0 2px 10px rgba(180, 50, 80, .35);
      transition: opacity .3s ease, transform .3s ease;
    }

    .env-seal.gone {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
    }

    .open-label {
      font-family: 'Caveat', cursive;
      font-size: 1.45rem;
      color: #c4735a;
      letter-spacing: .06em;
      padding-top: .6rem;
      animation: bob 2.4s ease-in-out infinite;
      transition: opacity .4s ease;
    }

    .open-label.hidden {
      opacity: 0;
      pointer-events: none;
      animation: none;
    }

    @keyframes bob {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-6px)
      }
    }

    /* ═══════════════════════════════════════
   LETTER MODAL
   ═══════════════════════════════════════ */
    .letter-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(253, 235, 215, .6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .45s ease;
    }

    .letter-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .letter-card {
      background: #fffcf7;
      border-radius: 22px;
      border: 1.5px solid #f0ddd0;
      box-shadow:
        0 6px 40px rgba(160, 90, 50, .18),
        0 1px 4px rgba(160, 90, 50, .1),
        inset 0 1px 0 rgba(255, 255, 255, .95);
      padding: 2.8rem 2.6rem 2.2rem;
      width: min(92vw, 440px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.3rem;
      transform: scale(.86) translateY(24px);
      transition: transform .52s cubic-bezier(.34, 1.48, .64, 1);
      position: relative;
      background-image: repeating-linear-gradient(transparent, transparent 31px,
          rgba(225, 190, 165, .3) 31px, rgba(225, 190, 165, .3) 32px);
      background-position: 0 46px;
    }

    .x-btn {
      position: absolute;
      top: 14px;
      right: 16px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid #e8c4b8;
      background: transparent;
      color: #c4735a;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s, transform .15s;
    }

    .x-btn:hover {
      background: #fde8da;
      transform: scale(1.1);
    }

    .x-btn:active {
      transform: scale(.95);
    }

    .letter-overlay.show .letter-card {
      transform: scale(1) translateY(0);
    }

    .letter-card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 64px;
      height: 4px;
      background: linear-gradient(90deg, #f9c0c8, #e8906a);
      border-radius: 0 0 6px 6px;
    }

    .letter-icon {
      font-size: 2rem;
      animation: hb 2.8s ease-in-out infinite;
    }

    @keyframes hb {

      0%,
      100% {
        transform: scale(1)
      }

      30% {
        transform: scale(1.2)
      }

      60% {
        transform: scale(1.06)
      }
    }

    .letter-text {
      font-family: 'Caveat', cursive;
      font-size: clamp(1.3rem, 4.8vw, 1.65rem);
      font-weight: 500;
      color: #5a3020;
      line-height: 1.7;
      text-align: center;
      min-height: 4.5rem;
      width: 100%;
    }

    .dots {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 300px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #eac8b8;
      transition: background .25s, transform .25s;
    }

    .dot.active {
      background: #c4735a;
      transform: scale(1.55);
    }

    .letter-nav {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: .3rem;
    }

    .nav-btn,
    .close-btn {
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      font-weight: 500;
      padding: 7px 22px;
      border-radius: 999px;
      border: 1.5px solid;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
    }

    .nav-btn {
      border-color: #d4957a;
      background: transparent;
      color: #a85540;
    }

    .nav-btn:hover {
      background: #fde8da;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(200, 100, 60, .18);
    }

    .nav-btn:active {
      transform: scale(.97);
    }

    .nav-btn:disabled {
      opacity: .3;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    .close-btn {
      border-color: #c4a0c8;
      background: transparent;
      color: #9050a0;
    }

    .close-btn:hover {
      background: #f5e8f8;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(160, 80, 180, .16);
    }

    .close-btn:active {
      transform: scale(.97);
    }

    .ttal-label {
      font-family: 'Caveat', cursive;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: #b87a62;
      letter-spacing: .06em;
      min-height: 1.4em;
      text-align: center;
    }

    .ttal-cards {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  margin-top: 1rem;
}
.ttal-cards.hidden { opacity: 0; }
.ttal-cards.fade-in {
  opacity: 1;
  transition: opacity 1.4s ease;
}

    .ttal-card {
      font-family: 'Caveat', cursive;
      font-size: 1.05rem;
      border-radius: 14px;
      padding: 12px 16px;
      width: 140px;
      text-align: center;
      line-height: 1.5;
      box-shadow: 0 2px 10px rgba(150, 80, 50, .08);
    }

    .ttal-card.truth {
      background: #f0faf3;
      border: 1.5px solid #a8d8b0;
      color: #2d6b3e;
    }

    .ttal-card.lie {
      background: #fdf0f3;
      border: 1.5px solid #f0a8b8;
      color: #8b2a40;
    }
  </style>
</head>

<body>

  <div class="petals" id="petals"></div>

  <div class="scene">
    <div class="greeting" id="greeting"><span class="cursor"></span></div>


    <div class="ttal-wrap" id="ttalWrap">
      <div class="ttal-label" id="ttalLabel"></div>
      <div class="ttal-cards" id="ttalCards"></div>
    </div>

    <div class="env-wrap" id="envWrap">
      <div class="envelope" id="envelope" onclick="openEnvelope()">
        <div class="env-body"></div>
        <div class="env-tri-left"></div>
        <div class="env-tri-right"></div>
        <div class="env-flap" id="flap"></div>
        <div class="env-seal" id="seal">&#10084;</div>
      </div>
      <div class="open-label" id="openLabel">Open me</div>
    </div>
  </div>

  <!-- letter modal — lives outside envelope, z-index 200 -->
  <div class="letter-overlay" id="letterOverlay">
    <div class="letter-card">
      <button class="x-btn" onclick="closeEnvelope()">✕</button>
      <div class="letter-icon">💌</div>
      <div class="letter-text" id="letterText"><span class="cursor"></span></div>
      <div class="dots" id="dots"></div>
      <div class="letter-nav">
        <button class="nav-btn" id="prevBtn" onclick="prevSentence()" disabled>← prev</button>
        <button class="nav-btn" id="nextBtn" onclick="nextSentence()">next →</button>
        <button class="close-btn" id="closeBtn" onclick="closeEnvelope()" style="display:none">seal it back ♡</button>
      </div>
    </div>
  </div>

  <script>
    const sentences = [
      "This might be the heaviest thing i've done yet, but please don't panic (@_@)",
      "I know the pacing is scaring you, this has never happened to me before as well (;_;)",
      "I don't know how to slow this down, and that might not be a bad thing you know (^_^)",
      "Just so you know... I’d never hand code a whole website for anyone else",
      "This is a one-time 'Sambhav Special' just for you (^o^)",
      "I keep almost saying things and stopping myself, so I put it here instead",
      "Somewhere between the long calls and seein your smile, I caught feelings",
      "I'm sorry for only ever acting insecure about myself around you (-_-)",
      "I wanted to surprise you with my dashing looks irl *_*",
      "You're such an amazing person, truly a fucking gem <[]",
      "I know the timing is weird, but I can't make it make sense either",
      "I’m scared too, Jae.. just of different things than you are",
      "I don't want to lose whatever this is by trying to define it",
      "Just... don't disappear on me",
      "Let's try to match each other's pace, and slowly figure things out together.. —Sambhav <3"
    ];

    let current = 0, typeTO = null, isOpen = false;

    function typeText(el, text, speed, cb) {
      if (typeTO) { clearTimeout(typeTO); typeTO = null; }
      el.innerHTML = '';
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      el.appendChild(cursor);
      (function tick() {
        if (i < text.length) {
          cursor.before(text[i++]);
          typeTO = setTimeout(tick, speed);
        } else if (cb) cb();
      })();
    }

    function buildDots() {
      const d = document.getElementById('dots');
      d.innerHTML = '';
      sentences.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === current ? ' active' : '');
        d.appendChild(dot);
      });
    }

    function updateDots() {
      document.querySelectorAll('.dot').forEach((d, i) =>
        d.className = 'dot' + (i === current ? ' active' : ''));
    }

    function showSentence(idx) {
      current = idx;
      updateDots();
      document.getElementById('prevBtn').disabled = (current === 0);
      const last = current === sentences.length - 1;
      document.getElementById('nextBtn').style.display = last ? 'none' : 'inline-block';
      document.getElementById('closeBtn').style.display = last ? 'inline-block' : 'none';
      typeText(document.getElementById('letterText'), sentences[current], 50);
    }

    function nextSentence() { if (current < sentences.length - 1) showSentence(current + 1); }
    function prevSentence() { if (current > 0) showSentence(current - 1); }

    function openEnvelope() {
      if (isOpen) return;
      isOpen = true;
      document.getElementById('envelope').classList.add('open-state');
      document.getElementById('flap').classList.add('opened');
      document.getElementById('seal').classList.add('gone');
      document.getElementById('openLabel').classList.add('hidden');

      setTimeout(() => {
        current = 0;
        buildDots();
        document.getElementById('letterOverlay').classList.add('show');
        showSentence(0);
      }, 560);
    }

    function closeEnvelope() {
      if (!isOpen) return;
      // fade out modal
      document.getElementById('letterOverlay').classList.remove('show');
      if (typeTO) { clearTimeout(typeTO); typeTO = null; }

      // then seal the envelope back
      setTimeout(() => {
        isOpen = false;
        document.getElementById('envelope').classList.remove('open-state');
        document.getElementById('flap').classList.remove('opened');
        document.getElementById('seal').classList.remove('gone');
        document.getElementById('openLabel').classList.remove('hidden');
        // reset letter state
        document.getElementById('letterText').innerHTML = '<span class="cursor"></span>';
        document.getElementById('dots').innerHTML = '';
        current = 0;
        document.getElementById('prevBtn').disabled = true;
        document.getElementById('nextBtn').style.display = 'inline-block';
        document.getElementById('closeBtn').style.display = 'none';
      }, 480);
    }

    // petals
    (function () {
      const c = document.getElementById('petals');
      const cols = ['#f9c8d0', '#f7b8c8', '#fdd5c0', '#fce8d5', '#f5c2ce', '#fadadd', '#ffecd8'];
      for (let i = 0; i < 26; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        const w = 6 + Math.random() * 7;
        p.style.cssText = `left:${Math.random() * 100}vw;width:${w}px;height:${w * 1.5}px;`
          + `background:${cols[~~(Math.random() * cols.length)]};`
          + `border-radius:${Math.random() > .5 ? '50% 0 50% 0' : '50% 50% 0 50%'};`
          + `animation-duration:${7 + Math.random() * 11}s;`
          + `animation-delay:${Math.random() * 16}s;`;
        c.appendChild(p);
      }
    })();

    // greeting
    setTimeout(() => {
  typeText(document.getElementById('greeting'), 'Hi Jae ♡', 90, () => {
    const label = document.getElementById('ttalLabel');
    document.getElementById('ttalWrap').classList.add('visible');
    setTimeout(() => {
      typeText(label, '2 truths & a lie ✦', 45, () => {
        const cards = document.getElementById('ttalCards');
        cards.classList.add('hidden');
        cards.innerHTML = `
          <div class="ttal-card truth">This took forever to make :#</div>
          <div class="ttal-card lie">I'm totally fine not talking to you :/</div>
          <div class="ttal-card truth">Gato is deaf <'(o.o)'></div>
        `;
        setTimeout(() => {
          cards.classList.remove('hidden');
          cards.classList.add('fade-in');
          setTimeout(() => document.getElementById('envWrap').classList.add('visible'), 1000);
        }, 100);
      });
    }, 300);
  });
}, 500);
  </script>
</body>

</html>
